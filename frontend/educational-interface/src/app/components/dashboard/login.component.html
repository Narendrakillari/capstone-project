<div class="security-gateway-matrix">
  <!-- Glowing large logo watermark in the background -->
  <img src="logo.png" alt="VisualLearn AI Logo Watermark" class="auth-bg-logo" />

  <div class="auth-glass-card fade-in">
    
    <div class="auth-brand-header">
      <!-- Crisp logo centered above the text -->
      <div class="auth-brand-badge-wrapper">
        <img src="logo.png" alt="VisualLearn AI Logo" class="auth-brand-logo-img" />
      </div>
      <h2>VisualLearn AI</h2>
      <p class="auth-subtitle">Quantum Security & Learning Gateway</p>
    </div>

    <!-- Toggle Selector Tabs -->
    <div class="auth-tabs-nav">
      <button 
        type="button" 
        class="auth-tab-btn" 
        [class.active]="!isSignUpActive" 
        (click)="toggleTab('login')"
      >
        Sign In
      </button>
      <button 
        type="button" 
        class="auth-tab-btn" 
        [class.active]="isSignUpActive" 
        (click)="toggleTab('signup')"
      >
        Register
      </button>
    </div>

    <!-- Success / Info Message -->
    <div *ngIf="successMessage" class="auth-success-banner">
      ✓ {{ successMessage }}
    </div>

    <!-- Error Banner -->
    <div *ngIf="errorMessage" class="auth-error-banner">
      ⚠️ {{ errorMessage }}
    </div>

    <!-- 1. Log In Form -->
    <form *ngIf="!isSignUpActive" (ngSubmit)="handleAuthSubmission()" #loginForm="ngForm" class="auth-form-layout">
      <div class="input-control-group">
        <label for="username">System Username</label>
        <div class="field-wrapper">
          <input 
            type="text" 
            id="username" 
            name="username"
            [(ngModel)]="username" 
            placeholder="Enter username" 
            required
            autocomplete="off"
          />
        </div>
      </div>

      <div class="input-control-group">
        <label for="password">Security Password</label>
        <div class="field-wrapper">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            name="password"
            [(ngModel)]="password" 
            placeholder="••••••••" 
            required
          />
          <button type="button" class="password-toggle-btn" (click)="showPassword = !showPassword" aria-label="Toggle password visibility">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="!loginForm.form.valid" class="btn-auth-submit">
        Authenticate Session ➔
      </button>
    </form>

    <!-- 2. Sign Up Form -->
    <form *ngIf="isSignUpActive" (ngSubmit)="handleSignUpSubmission()" #signUpForm="ngForm" class="auth-form-layout">
      <div class="input-control-group">
        <label for="reg_username">Enter your name</label>
        <div class="field-wrapper">
          <input 
            type="text" 
            id="reg_username" 
            name="reg_username"
            [(ngModel)]="signUpUsername" 
            placeholder="Enter your name" 
            required
            autocomplete="off"
          />
        </div>
      </div>

      <div class="input-control-group">
        <label for="reg_email">Email Address</label>
        <div class="field-wrapper">
          <input 
            type="email" 
            id="reg_email" 
            name="reg_email"
            [(ngModel)]="signUpEmail" 
            placeholder="Enter email address (optional)"
          />
        </div>
      </div>

      <div class="input-control-group">
        <label for="reg_password">Create Password</label>
        <div class="field-wrapper">
          <input 
            [type]="showRegPassword ? 'text' : 'password'" 
            id="reg_password" 
            name="reg_password"
            [(ngModel)]="signUpPass" 
            placeholder="••••••••" 
            required
          />
          <button type="button" class="password-toggle-btn" (click)="showRegPassword = !showRegPassword" aria-label="Toggle password visibility">
            <svg *ngIf="!showRegPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showRegPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="input-control-group">
        <label for="reg_confirm_password">Confirm Password</label>
        <div class="field-wrapper">
          <input 
            [type]="showRegConfirmPassword ? 'text' : 'password'" 
            id="reg_confirm_password" 
            name="reg_confirm_password"
            [(ngModel)]="signUpConfirmPass" 
            placeholder="••••••••" 
            required
          />
          <button type="button" class="password-toggle-btn" (click)="showRegConfirmPassword = !showRegConfirmPassword" aria-label="Toggle password visibility">
            <svg *ngIf="!showRegConfirmPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showRegConfirmPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="!signUpForm.form.valid" class="btn-auth-submit">
        Register Account ➔
      </button>
    </form>

    <div class="auth-compliance-footer">
      <p>Authorized access points only. All operations monitored securely.</p>
    </div>

  </div>
</div>
